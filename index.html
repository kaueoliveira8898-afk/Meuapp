<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f5f5f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.login-container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    width: 85%;
    max-width: 350px;
    text-align: center;
}
h2 { margin-bottom: 25px; font-weight: 600; }
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-sizing: border-box;
    background-color: #fbfbfd;
    font-size: 16px;
}
button {
    width: 100%;
    padding: 12px;
    background-color: #0071e3;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
}
.error { color: #ff3b30; font-size: 14px; margin-top: 15px; display: none; }
</style>

<div class="login-container" id="loginBox">
    <div id="fluxoLogin">
        <h2>Bem-vindo</h2>
        <input type="email" id="email" placeholder="Seu e-mail do Gmail" autocapitalize="none">
        <button id="btnEnviar">Receber Link de Acesso</button>
    </div>

    <div id="fluxoCodigo" style="display: none;">
        <h2 style="color: #0071e3;">Verifique seu Gmail</h2>
        <p style="font-size: 14px; color: #555;">O Google acabou de enviar um link de login para a sua caixa de entrada.</p>
        <p><strong id="emailDestino" style="color: #333;"></strong></p>
        <p style="font-size: 13px; color: #888; margin-top: 20px;">Abra o e-mail no seu celular e clique no link para acessar o app.</p>
    </div>

    <div class="error" id="erro"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDufE2svFYjdFvGAYhZkKgH8uyYdHDj8xM",
    authDomain: "meuapplogim.firebaseapp.com",
    projectId: "meuapplogim",
    storageBucket: "meuapplogim.firebasestorage.app",
    messagingSenderId: "510256757580",
    appId: "1:510256757580:web:12b86d9b72a34d5a4c2de9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

async function fazerLogin() {
    const emailInput = document.getElementById('email').value.trim();
    const erroDiv = document.getElementById('erro');
    const regexGmail = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

    if (emailInput === "") {
        erroDiv.innerText = "Por favor, digite seu e-mail.";
        erroDiv.style.display = "block";
        return;
    }

    if (!regexGmail.test(emailInput)) {
        erroDiv.innerText = "Por favor, insira um e-mail válido do Gmail.";
        erroDiv.style.display = "block";
        return;
    }

    const actionCodeSettings = {
        url: window.location.href, // Faz retornar exatamente para o mesmo link onde o site está rodando
        handleCodeInApp: true,
    };

    try {
        await sendSignInLinkToEmail(auth, emailInput, actionCodeSettings);
        window.localStorage.setItem('emailForSignIn', emailInput);
        
        document.getElementById('fluxoLogin').style.display = "none";
        document.getElementById('fluxoCodigo').style.display = "block";
        document.getElementById('emailDestino').innerText = emailInput;
        erroDiv.style.display = "none";
    } catch (error) {
        erroDiv.innerText = "Erro do Firebase: " + error.message;
        erroDiv.style.display = "block";
    }
}

async function verificarRetornoDoEmail() {
    const loginBox = document.getElementById('loginBox');
    if (isSignInWithEmailLink(auth, window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn');
        if (!email) {
            email = window.prompt('Confirme o seu e-mail do Gmail para acessar:');
        }
        try {
            await signInWithEmailLink(auth, email, window.location.href);
            window.localStorage.removeItem('emailForSignIn');
            loginBox.innerHTML = `
                <h2 style="color: #34c759;">Acesso Liberado!</h2>
                <p>Parabéns, seu e-mail foi validado com sucesso.</p>
                <p style="color: gray; font-size: 14px;">Logado como: <strong>${email}</strong></p>
            `;
        } catch (error) {
            alert("Erro ao confirmar o link: " + error.message);
        }
    }
}

document.getElementById('btnEnviar').addEventListener('click', fazerLogin);
verificarRetornoDoEmail();
</script>
